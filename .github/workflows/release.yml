name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # matches 1.0.0, 2.3.1, etc.

permissions:
  contents: write    # to upload release assets
  packages: write    # to push Docker image to ghcr.io

jobs:
  # ── Build and push multi-arch Docker image ─────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}

  # ── Compile LaTeX and upload PDF as release asset ──────────────────────────
  latex:
    runs-on: ubuntu-latest
    container:
      image: danteev/texlive:latest   # full TeX Live with XeLaTeX
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install ImageMagick and fonts
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            imagemagick fonts-firacode
          # Allow ImageMagick to convert PDFs (policy restriction on some images)
          sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' \
            /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Install Fira Sans and Fira Math fonts
        run: |
          # If Fira Sans is not packaged, download it
          mkdir -p /usr/local/share/fonts/fira
          curl -sL "https://github.com/mozilla/Fira/archive/refs/tags/4.106.tar.gz" \
            | tar xz --strip-components=2 -C /usr/local/share/fonts/fira "Fira-4.106/otf/"
          # FiraCode NF
          curl -sL "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FiraCode.tar.gz" \
            | tar Jx -C /usr/local/share/fonts/fira
          # Fira Math
          curl -sL "https://github.com/firamath/firamath/releases/download/v0.3.4/FiraMath-Regular.otf" \
            -o /usr/local/share/fonts/fira/FiraMath-Regular.otf
          fc-cache -fv

      - name: Inject version into LaTeX
        run: |
          echo "\\newcommand{\\docversion}{${{ steps.version.outputs.VERSION }}}" \
            > docs/version.tex

      - name: Build diagram and PDF
        run: |
          cd docs
          make all

      - name: Upload PDF as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: docs/exercises.pdf
          tag_name: ${{ github.ref_name }}
